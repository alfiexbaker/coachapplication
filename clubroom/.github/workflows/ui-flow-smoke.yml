name: UI Flow Smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    name: smoke-${{ matrix.profile }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [coach-core, parent-core, athlete-core, trust-core]
    defaults:
      run:
        working-directory: clubroom

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clubroom/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright package and Chromium
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Start web app
        run: |
          nohup npm run web -- --port 8083 --non-interactive > /tmp/ui-flow-web.log 2>&1 &

      - name: Wait for web app
        run: |
          for attempt in {1..120}; do
            if curl -fsS "http://127.0.0.1:8083" >/dev/null; then
              echo "Web app is ready."
              exit 0
            fi
            sleep 2
          done
          echo "Web app failed to start on port 8083"
          tail -n 200 /tmp/ui-flow-web.log || true
          exit 1

      - name: Run profile flow checks
        run: >
          node ./scripts/ui-flow-checks-50.mjs
          --profile=${{ matrix.profile }}
          --fail-on=none
          --retries=1
          --pause-ms=500
          --out-dir=/tmp/ui-flow-${{ matrix.profile }}

      - name: Upload profile artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-flow-${{ matrix.profile }}
          path: |
            /tmp/ui-flow-${{ matrix.profile }}
            /tmp/ui-flow-web.log
          if-no-files-found: warn

  merge:
    name: merge-gate
    runs-on: ubuntu-latest
    needs: smoke
    defaults:
      run:
        working-directory: clubroom

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clubroom/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download profile artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ui-flow-*
          path: /tmp/ui-flow-artifacts
          merge-multiple: true

      - name: Merge and enforce high-severity gate
        run: >
          npm run ui:flows:merge --
          --input-dir=/tmp/ui-flow-artifacts
          --output-dir=/tmp/ui-flow-merged
          --fail-on=high

      - name: Upload merged artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-flow-merged
          path: /tmp/ui-flow-merged
          if-no-files-found: warn

      - name: Publish merged summary
        if: always()
        run: |
          if [ -f /tmp/ui-flow-merged/report.merged.md ]; then
            cat /tmp/ui-flow-merged/report.merged.md >> "$GITHUB_STEP_SUMMARY"
          fi

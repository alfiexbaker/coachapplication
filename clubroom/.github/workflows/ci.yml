name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clubroom

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clubroom/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npm run typecheck -- --noEmit

      - name: Lint
        run: npx expo lint

      - name: Format Check
        run: npx prettier --check 'app/**/*.tsx' 'components/**/*.tsx' 'services/**/*.ts' 'hooks/**/*.ts'

      - name: Compile Tests
        run: npm run test:compile

      - name: Run Tests
        run: node --require ./scripts/test-register.js --test $(find .tmp-tests/__tests__ -type f -name '*.js' | sort) $(find .tmp-tests/services -type f -name '*.test.js' | sort)
